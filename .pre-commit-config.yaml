repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: block-secrets-pre-commit
        name: block secrets in staged files (.githooks)
        entry: powershell -NoProfile -ExecutionPolicy Bypass -File .githooks/pre-commit.ps1
        language: system
        pass_filenames: false
        always_run: true
